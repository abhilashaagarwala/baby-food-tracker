<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Baby Food Tracker</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    h1 { color: #e07b54; }
    label { font-size: 14px; color: #555; }
    input { width: 100%; padding: 8px; margin: 4px 0 12px; box-sizing: border-box; }
    button { background: #e07b54; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #c4613c; }
    .counter { font-size: 18px; font-weight: bold; color: #e07b54; margin: 16px 0 8px; }
    .counter span { font-size: 32px; }
    .alert { background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; display: none; }
    .entry { border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
    .date { font-weight: bold; color: #e07b54; margin-right: 12px; }
    .del { background: none; color: #aaa; border: none; font-size: 18px; cursor: pointer; padding: 0 4px; }
    .del:hover { color: #e07b54; }
  </style>
</head>
<body>
  <h1>🍼 Baby Food Tracker</h1>

  <div class="counter">New foods introduced: <span id="food-count">0</span></div>

  <label>Date</label>
  <input type="date" id="meal-date" />
  <label>Food item</label>
  <input type="text" id="meal-item" placeholder="e.g. mashed banana" />

  <div class="alert" id="already-eaten">
    👶 Baby's eaten this before!
  </div>

  <button onclick="addMeal()">Add Entry</button>

  <h2>History</h2>
  <div id="entries"></div>

  <script>
    async function loadMeals() {
      const [mealsRes, countRes] = await Promise.all([fetch('/meals'), fetch('/meals/count')]);
      const meals = await mealsRes.json();
      const { unique_foods } = await countRes.json();

      document.getElementById('food-count').textContent = unique_foods;

      const el = document.getElementById('entries');
      el.innerHTML = meals.length === 0 ? '<p>No entries yet.</p>' : meals.map(m => `
        <div class="entry">
          <span class="date">${m.meal_date}</span>
          <span style="flex:1">${m.item}</span>
          <button class="del" onclick="deleteMeal(${m.id})">✕</button>
        </div>
      `).join('');
    }

    async function addMeal() {
      const meal_date = document.getElementById('meal-date').value;
      const item = document.getElementById('meal-item').value.trim();
      if (!meal_date || !item) return alert('Please fill in both fields.');

      const res = await fetch('/meals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ meal_date, item })
      });
      const data = await res.json();

      const alertEl = document.getElementById('already-eaten');
      if (data.already_eaten) {
        alertEl.style.display = 'block';
      } else {
        alertEl.style.display = 'none';
      }

      document.getElementById('meal-item').value = '';
      loadMeals();
    }

    async function deleteMeal(id) {
      await fetch(`/meals/${id}`, { method: 'DELETE' });
      document.getElementById('already-eaten').style.display = 'none';
      loadMeals();
    }

    // set today's date as default
    document.getElementById('meal-date').valueAsDate = new Date();
    loadMeals();
  </script>
</body>
</html>
